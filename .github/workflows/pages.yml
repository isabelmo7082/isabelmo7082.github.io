name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          ACAC76: ${{ secrets.ACAC76 }}
          B08C9E: ${{ secrets.B08C9E }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('ACAC76', '')
          meta_b = os.environ.get('B08C9E', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- e3bee6465441aa8e06dd01 -->', meta_a)
          if meta_b:
              out = out.replace('<!-- ba0bbe8ac4dc119f258489dc49978fa7 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
